<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>年会抽奖</title>
  <meta name="description" content="年会抽奖工具 — 炫酷大屏抽奖体验">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/glass.css">
  <link rel="stylesheet" href="/css/animations.css">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <!-- 粒子背景 Canvas -->
  <canvas id="particles-canvas"></canvas>

  <!-- 弹幕层 -->
  <div id="danmaku-container"></div>

  <!-- 主界面 -->
  <div class="lottery-app" id="lottery-app">

    <!-- 顶部：Logo + 标题 -->
    <header class="lottery-header" id="lottery-header">
      <div class="header-logo" id="header-logo">
        <img src="" alt="Logo" id="company-logo" style="display:none;">
      </div>
      <h1 class="header-title text-shimmer" id="activity-title">2026 年会盛典</h1>
      <div class="header-actions">
        <span class="glass-badge" id="sync-presence">在线 0</span>
        <button class="glass-btn glass-btn--sm" id="btn-fullscreen" title="全屏">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
          </svg>
        </button>
        <button class="glass-btn glass-btn--sm" id="btn-sound-toggle" title="音效">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
        </button>
        <a href="admin.html" class="glass-btn glass-btn--sm" title="管理">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2m-9-11h2m18 0h2m-3.64-6.36l-1.42 1.42M6.34 17.66l-1.42 1.42m0-14.14l1.42 1.42m11.32 11.32l1.42 1.42"/>
          </svg>
        </a>
      </div>
    </header>

    <!-- 当前奖项信息 -->
    <section class="prize-info" id="prize-info">
      <div class="prize-badge glass-badge glass-badge--gold" id="prize-level" style="display: none;"></div>
      <h2 class="prize-name" id="prize-name"></h2>
      <p class="prize-desc" id="prize-desc"></p>
      <div class="prize-meta" style="display: none;" id="prize-meta">
        <span class="prize-remaining" id="prize-remaining"></span>
        <span class="prize-total" id="prize-total"></span>
      </div>
    </section>

    <section class="checkin-wall glass-card--medium" id="checkin-wall">
      <div class="checkin-wall-header">
        <div>
          <span class="checkin-wall-label">现场签到墙</span>
          <h3 class="checkin-wall-title">已签到嘉宾</h3>
        </div>
        <span class="glass-badge" id="checkin-count">0 人</span>
      </div>
      <div class="checkin-list" id="checkin-list"></div>
    </section>

    <!-- 滚动抽奖区域 -->
    <section class="lottery-stage" id="lottery-stage">
      <!-- 抽奖卡片容器 -->
      <div class="slot-container" id="slot-container">
        <!-- 动态生成 -->
      </div>

      <!-- 中奖结果展示 -->
      <div class="winner-display" id="winner-display" style="display: none;">
        <div class="winner-cards" id="winner-cards"></div>
      </div>
    </section>

    <!-- 操作按钮区 -->
    <section class="lottery-controls" id="lottery-controls">
      <button class="glass-btn glass-btn--primary glass-btn--lg" id="btn-start">
        开始抽奖
      </button>
      <button class="glass-btn glass-btn--lg" id="btn-next-prize" style="display: none;">
        下一奖项
      </button>
    </section>

    <!-- 底部：已中奖名单 -->
    <footer class="lottery-footer" id="lottery-footer">
      <div class="footer-winners" id="footer-winners">
        <span class="footer-label">已中奖:</span>
        <div class="footer-winner-list" id="footer-winner-list"></div>
      </div>
    </footer>

  </div>

  <!-- 无数据提示弹窗 -->
  <div class="glass-modal-overlay" id="modal-no-data">
    <div class="glass-modal">
      <h3 style="font-size: var(--text-xl); margin-bottom: var(--space-md);">尚未配置数据</h3>
      <p style="color: var(--text-secondary); margin-bottom: var(--space-xl);">请先前往管理页面添加参与人员和配置奖项。</p>
      <div style="display: flex; gap: var(--space-md); justify-content: flex-end;">
        <a href="admin.html" class="glass-btn glass-btn--primary">前往后台配置</a>
      </div>
    </div>
  </div>

  <!-- 抽奖完成弹窗 -->
  <div class="glass-modal-overlay" id="modal-complete">
    <div class="glass-modal" style="text-align: center;">
      <h3 style="font-size: var(--text-2xl); margin-bottom: var(--space-sm);">🎉</h3>
      <h3 style="font-size: var(--text-xl); margin-bottom: var(--space-md);">所有奖项已抽取完毕！</h3>
      <p style="color: var(--text-secondary); margin-bottom: var(--space-xl);">恭喜所有中奖者！</p>
      <div style="display: flex; gap: var(--space-md); justify-content: center;">
        <a href="results.html" class="glass-btn glass-btn--primary">查看中奖名单</a>
        <button class="glass-btn" id="btn-complete-close">关闭</button>
      </div>
    </div>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
