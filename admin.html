<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>抽奖管理后台</title>
  <meta name="description" content="年会抽奖工具管理后台">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/glass.css">
  <link rel="stylesheet" href="/css/animations.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <!-- 侧边栏 -->
    <aside class="admin-sidebar glass-card--medium" id="admin-sidebar">
      <div class="sidebar-header">
        <h2 class="sidebar-title">抽奖管理</h2>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-item active" data-section="participants" id="nav-participants">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          人员管理
        </button>
        <button class="nav-item" data-section="prizes" id="nav-prizes">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/>
          </svg>
          奖项设置
        </button>
        <button class="nav-item" data-section="activities" id="nav-activities">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          活动管理
        </button>
        <button class="nav-item" data-section="settings" id="nav-settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          主题设置
        </button>
        <button class="nav-item" data-section="logs" id="nav-logs">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
          操作日志
        </button>
      </nav>
      <div class="sidebar-footer">
        <a href="index.html" class="glass-btn glass-btn--primary" style="width: 100%; justify-content: center;">
          进入抽奖
        </a>
        <a href="results.html" class="glass-btn glass-btn--sm" style="width: 100%; justify-content: center; margin-top: var(--space-md);">
          中奖名单
        </a>
      </div>
    </aside>

    <!-- 主内容区 -->
    <main class="admin-main" id="admin-main">

      <!-- 人员管理 -->
      <section class="admin-section active" id="section-participants">
        <div class="section-header">
          <h2>签到用户</h2>
          <div class="section-actions">
            <button class="glass-btn glass-btn--danger glass-btn--sm" id="btn-clear-participants">清空人员</button>
            <button class="glass-btn glass-btn--primary glass-btn--sm" id="btn-add-person">添加人员</button>
          </div>
        </div>
        <div class="section-stats" id="participant-stats">
          <div class="stat-card glass-card">
            <span class="stat-value" id="stat-total-people">0</span>
            <span class="stat-label">签到总数</span>
          </div>
          <div class="stat-card glass-card">
            <span class="stat-value" id="stat-last-signin">-</span>
            <span class="stat-label">最近签到</span>
          </div>
          <div class="stat-card glass-card">
            <span class="stat-value" id="stat-won-people">0</span>
            <span class="stat-label">已中奖</span>
          </div>
          <div class="stat-card glass-card">
            <span class="stat-value" id="stat-available">0</span>
            <span class="stat-label">可抽奖</span>
          </div>
        </div>
        <div class="table-container glass-card">
          <table class="data-table" id="participants-table">
            <thead>
              <tr><th>头像</th><th>昵称</th><th>签到时间</th><th>状态</th><th>操作</th></tr>
            </thead>
            <tbody id="participants-tbody"></tbody>
          </table>
          <div class="empty-state" id="participants-empty">
            <p>暂无人员数据</p>
            <p style="color: var(--text-tertiary); font-size: var(--text-sm);">活动开始前，可手动补录昵称或等待现场扫码签到</p>
          </div>
        </div>
      </section>

      <!-- 奖项设置 -->
      <section class="admin-section" id="section-prizes">
        <div class="section-header">
          <h2>奖项设置</h2>
          <div class="section-actions">
            <button class="glass-btn glass-btn--danger glass-btn--sm" id="btn-clear-prizes">清空奖项</button>
            <button class="glass-btn glass-btn--sm" id="btn-load-sample-prizes">加载示例奖项</button>
            <button class="glass-btn glass-btn--primary glass-btn--sm" id="btn-add-prize">添加奖项</button>
          </div>
        </div>
        <div class="prizes-grid" id="prizes-grid"></div>
        <div class="empty-state" id="prizes-empty">
          <p>暂无奖项</p>
          <p style="color: var(--text-tertiary); font-size: var(--text-sm);">点击「添加奖项」开始配置</p>
        </div>
      </section>

      <!-- 活动管理 -->
      <section class="admin-section" id="section-activities">
        <div class="section-header">
          <h2>活动管理</h2>
          <button class="glass-btn glass-btn--primary glass-btn--sm" id="btn-create-activity">创建活动</button>
        </div>
        <div class="activities-list" id="activities-list"></div>
      </section>

      <!-- 主题设置 -->
      <section class="admin-section" id="section-settings">
        <div class="section-header">
          <h2>主题设置</h2>
        </div>
        <div class="settings-form glass-card" style="padding: var(--space-xl);">
          <div class="form-group">
            <label class="form-label">活动标题</label>
            <input type="text" class="glass-input" id="setting-title" placeholder="例如：2026 年会盛典">
          </div>
          <div class="form-group">
            <label class="form-label">Logo URL</label>
            <input type="text" class="glass-input" id="setting-logo" placeholder="透明背景图片 URL">
          </div>
          <div class="form-group">
            <label class="form-label">背景图 URL</label>
            <input type="text" class="glass-input" id="setting-bg" placeholder="主屏幕背景图 URL">
          </div>
          <div class="form-group">
            <label class="form-label">主题主色</label>
            <div style="display: flex; gap: var(--space-md); align-items: center;">
              <input type="color" id="setting-accent-color" value="#c9a84c" style="width: 50px; height: 36px; border: none; background: transparent; cursor: pointer;">
              <span style="color: var(--text-tertiary); font-size: var(--text-xs);">调整后需刷新页面查看完整效果</span>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">音效</label>
            <label class="toggle-switch">
              <input type="checkbox" id="setting-sound" checked>
              <span class="toggle-slider"></span>
              <span class="toggle-text">开启音效</span>
            </label>
          </div>
          <div class="form-group">
            <label class="form-label">粒子效果</label>
            <label class="toggle-switch">
              <input type="checkbox" id="setting-particles" checked>
              <span class="toggle-slider"></span>
              <span class="toggle-text">背景粒子动画</span>
            </label>
          </div>
          <div class="form-group">
            <label class="form-label">弹幕</label>
            <label class="toggle-switch">
              <input type="checkbox" id="setting-danmaku">
              <span class="toggle-slider"></span>
              <span class="toggle-text">开启弹幕互动</span>
            </label>
          </div>
          <div class="form-group">
            <label class="form-label">重复中奖</label>
            <label class="toggle-switch">
              <input type="checkbox" id="setting-repeat">
              <span class="toggle-slider"></span>
              <span class="toggle-text">允许同一人多次中奖</span>
            </label>
          </div>
          <div class="form-group">
            <label class="form-label">辅助工具</label>
            <button class="glass-btn glass-btn--sm" id="btn-show-qrcode">生成签到二维码</button>
            <button class="glass-btn glass-btn--sm" id="btn-open-sign" style="margin-left: var(--space-sm);">预览签到页</button>
            <button class="glass-btn glass-btn--sm" id="btn-open-viewer" style="margin-left: var(--space-sm);">打开管理员H5签到码</button>
          </div>
          <div class="form-group">
            <label class="form-label">危险操作</label>
            <button class="glass-btn glass-btn--danger glass-btn--sm" id="btn-clear-winners">清除中奖记录</button>
            <button class="glass-btn glass-btn--danger glass-btn--sm" id="btn-clear-all" style="margin-left: var(--space-sm);">重置所有数据</button>
          </div>
        </div>
      </section>

      <!-- 操作日志 -->
      <section class="admin-section" id="section-logs">
        <div class="section-header">
          <h2>操作日志</h2>
          <div class="section-actions">
            <button class="glass-btn glass-btn--sm" id="btn-export-logs">导出日志</button>
            <button class="glass-btn glass-btn--danger glass-btn--sm" id="btn-clear-logs">清空日志</button>
          </div>
        </div>
        <div class="logs-anomalies" id="logs-anomalies"></div>
        <div class="table-container glass-card">
          <table class="data-table" id="logs-table">
            <thead>
              <tr><th>时间</th><th>操作</th><th>详情</th></tr>
            </thead>
            <tbody id="logs-tbody"></tbody>
          </table>
        </div>
      </section>

    </main>
  </div>

  <!-- 添加人员弹窗 -->
  <div class="glass-modal-overlay" id="modal-add-person">
    <div class="glass-modal">
      <h3 style="margin-bottom: var(--space-lg);">手动补录签到用户</h3>
      <div class="form-group">
        <label class="form-label">昵称 *</label>
        <input type="text" class="glass-input" id="input-person-name" placeholder="例如：小王">
      </div>
      <div class="form-group">
        <label class="form-label">头像 URL</label>
        <input type="text" class="glass-input" id="input-person-avatar" placeholder="可选，不填则自动使用昵称首字">
      </div>
      <div style="display: flex; gap: var(--space-md); justify-content: flex-end; margin-top: var(--space-xl);">
        <button class="glass-btn" id="btn-cancel-person">取消</button>
        <button class="glass-btn glass-btn--primary" id="btn-save-person">保存</button>
      </div>
    </div>
  </div>

  <!-- 添加奖项弹窗 -->
  <div class="glass-modal-overlay" id="modal-add-prize">
    <div class="glass-modal">
      <h3 style="margin-bottom: var(--space-lg);">添加奖项</h3>
      <div class="form-group">
        <label class="form-label">奖项等级 *</label>
        <input type="text" class="glass-input" id="input-prize-level" placeholder="例如：一等奖">
      </div>
      <div class="form-group">
        <label class="form-label">奖品名称 *</label>
        <input type="text" class="glass-input" id="input-prize-name" placeholder="例如：iPhone 16 Pro">
      </div>
      <div class="form-group">
        <label class="form-label">奖品描述</label>
        <input type="text" class="glass-input" id="input-prize-desc" placeholder="简短描述">
      </div>
      <div class="form-group">
        <label class="form-label">中奖人数 *</label>
        <input type="number" class="glass-input" id="input-prize-count" placeholder="1" min="1" value="1">
      </div>
      <div style="display: flex; gap: var(--space-md); justify-content: flex-end; margin-top: var(--space-xl);">
        <button class="glass-btn" id="btn-cancel-prize">取消</button>
        <button class="glass-btn glass-btn--primary" id="btn-save-prize">保存</button>
      </div>
    </div>
  </div>
  <!-- 二维码弹窗 -->
  <div class="glass-modal-overlay" id="modal-qrcode">
    <div class="glass-modal" style="text-align: center;">
      <h3 style="margin-bottom: var(--space-lg);">签到二维码</h3>
      <div id="qrcode-container" style="display: flex; justify-content: center; margin-bottom: var(--space-lg);"></div>
      <p style="color: var(--text-secondary); font-size: var(--text-sm); margin-bottom: var(--space-xl);">
        请参与者扫描上方二维码进行签到。<br>
        签到成功后将自动加入抽奖池。
      </p>
      <div style="display: flex; gap: var(--space-md); justify-content: center;">
        <button class="glass-btn" id="btn-close-qrcode">关闭</button>
      </div>
    </div>
  </div>

  <script type="module" src="/js/admin.js"></script>
</body>
</html>
