<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中奖查询 - 年会抽奖</title>
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/glass.css">
  <style>
    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top right, rgba(201, 168, 76, 0.18), transparent 30%),
        linear-gradient(180deg, #0c0c0e, #15161a 55%, #171718);
      color: var(--text-primary);
      padding: var(--space-xl);
    }
    .query-page {
      max-width: 560px;
      margin: 0 auto;
      display: grid;
      gap: var(--space-lg);
    }
    .query-card {
      padding: var(--space-2xl);
    }
    .query-title {
      font-size: var(--text-2xl);
      font-weight: var(--weight-bold);
      margin-bottom: var(--space-sm);
      color: var(--accent-primary);
    }
    .query-subtitle {
      color: var(--text-secondary);
      font-size: var(--text-sm);
      line-height: 1.7;
    }
    .query-actions {
      display: flex;
      gap: var(--space-sm);
      flex-wrap: wrap;
    }
    .query-result {
      display: none;
      gap: var(--space-md);
    }
    .query-result.active {
      display: grid;
    }
    .result-card {
      padding: var(--space-lg);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.03);
    }
    .result-card h3 {
      color: var(--accent-primary);
      margin-bottom: var(--space-sm);
      font-size: var(--text-lg);
      font-weight: var(--weight-semibold);
    }
    .result-card p {
      color: var(--text-secondary);
      font-size: var(--text-sm);
      line-height: 1.8;
    }
    .poster-preview {
      display: none;
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .poster-preview img {
      width: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <main class="query-page">
    <section class="glass-card--medium query-card">
      <h1 class="query-title" id="query-activity-title">中奖查询</h1>
      <p class="query-subtitle">输入姓名和工号，即可查询本场活动是否中奖。中奖后可直接生成并分享海报。</p>
    </section>

    <section class="glass-card query-card">
      <form id="query-form">
        <div class="form-group">
          <label class="form-label">工号 *</label>
          <input type="text" id="query-id" class="glass-input" placeholder="请输入工号" required>
        </div>
        <div class="form-group">
          <label class="form-label">姓名</label>
          <input type="text" id="query-name" class="glass-input" placeholder="请输入姓名，建议与工号一起填写">
        </div>
        <button type="submit" class="glass-btn glass-btn--primary" style="width: 100%;">立即查询</button>
      </form>
    </section>

    <section class="glass-card query-card query-result" id="query-result"></section>

    <section class="glass-card query-card poster-preview" id="poster-preview-card">
      <img id="poster-preview-image" alt="中奖海报预览">
      <div class="query-actions" style="margin-top: var(--space-lg);">
        <button class="glass-btn" id="btn-download-poster" type="button">下载海报</button>
        <button class="glass-btn glass-btn--primary" id="btn-share-poster" type="button">分享海报</button>
      </div>
    </section>
  </main>

  <script type="module" src="/js/query.js"></script>
</body>
</html>
